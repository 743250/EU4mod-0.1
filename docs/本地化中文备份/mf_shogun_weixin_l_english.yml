 quzhulangren:0 "驱逐浪人"
 desc_quzhulangren:0 "将流散浪人重新纳入家臣与地方秩序，以压低游离武装和地方动乱。"
 leshilezuo:0 "乐市乐座"
 desc_leshilezuo:0 "放宽市座与商贸限制，使财富流向幕府可控的城镇和商路。"
 bingnongfenli:0 "兵农分离"
 desc_bingnongfenli:0 "分离武人与农民的身份，使幕府更易维持常备武力。"
 shogun_weixin.a_title:0 "废除私关"
 shogun_weixin.b_title:0 "幕领检地"
 shogun_weixin.c_title:0 "身份统制"
 shogun_weixin.d_title:0 "禁中并公"
 shogun_weixin.e_title:0 "谱代大名"
 shogun_weixin.f_title:0 "武家诸法"
 shogun_weixin.g_title:0 "闭关锁国"
 shogun_weixin.h_title:0 "参勤交代"
 shogun_weixin.i_title:0 "征讨虾夷"
 shogun_weixin.j_title:0 "公仪裁断"
 shogun_weixin.k_title:0 "国替令"
 shogun_weixin.l_title:0 "诸藩监察"
 shogun_weixin.a.tt:0 "诸藩私设关卡阻断道路与宿场，削弱了公仪对流通的控制。废除私关后，商路将重新服从幕府秩序。\n\n幕府体系获得：\n贸易效率：§G+5.0%§!\n\n将军和天皇目标获得：\n商人：§G+1§!"
 shogun_weixin.b.a.tt:0 "所有直属属国独立倾向低于§Y50%§!。"
 shogun_weixin.b.b.tt:0 "土地账册是统治的根本。重新检定幕领与诸藩田地后，幕府将更清楚地掌握日本诸国的税赋与领有名分。\n\n将军和天皇目标获得：\n全国税收修正：§G+10.0%§!\n治理容量修正：§G+5.0%§!"
 shogun_weixin.c.a.tt:0 "固定大名家格与诸身份秩序，使幕府命令有籍可查，有例可循。\n\n将军和天皇目标获得：\n年度正统性：§G+1.00§!\n全国叛乱：§G-1.00§!\n属国独立倾向：§G-5.0%§!\n幕府外交接受度：§G+5§!"
 shogun_weixin.d.a.tt:0 "朝廷任官与公家礼仪必须归入幕府法理。将军的命令，需由朝廷名分加以确认。\n\n解锁幕府外交行动：§Y宣下奉行§!。\n§Y宣下奉行§!消耗§Y10§!御统，冷却§Y10§!年，可重新指定天皇目标。"
 shogun_weixin.e.k.tt:0 "需要完成§Y身份统制§!或§Y幕领检地§!。"
 shogun_weixin.e.a.tt:0 "谱代诸藩是将军家的近臣与中枢支柱。确立谱代制度后，幕府可以正式任命亲幕府大名。\n\n解锁幕府外交行动：§Y指定谱代大名§!。\n谱代大名上限为§Y3§!；完成任务§Y谱代中枢§!后，上限提高到§Y5§!。"
 shogun_weixin.f.k.tt:0 "至少完成§Y3§!项既有维新改革。"
 shogun_weixin.f.a.tt:0 "武家诸法将诸大名的战争、分封与从属关系纳入幕府法度。\n\n将军及幕府直属大名获得：\n允许使用§Y转移属国§!和谈条款\n属国独立倾向：§G-5.0%§!\n幕府外交接受度：§G+10§!\n\n重新分封已灭亡旧家时，可选择日本以外的旧家。\n完成任务§Y编定武家法度§!后，解锁相关幕府外交行动。"
 shogun_weixin.g.k.tt:0 "除空地外，整个日本地区必须由幕府、直属属国、陪臣或非朝贡属国控制。"
 shogun_weixin.g.a.tt:0 "闭关锁国将海外交流置于幕府管制之下。由此可安定武家秩序，却会拖慢技术流入。\n\n幕府体系全体获得：\n科技花费：§R+20.0%§!\n发展成本：§G-10.0%§!\n武士忠诚影响：§G+10.0%§!\n商人忠诚影响：§R-10.0%§!\n商人影响力：§G-5.0%§!"
 shogun_weixin.h.k.tt:0 "当前御令必须采用§Y参勤交代§!。"
 shogun_weixin.h.a.tt:0 "参勤交代由临时御令升为常法，诸大名必须定期往返于将军城下。\n\n解锁幕府外交行动：§Y强制参勤交代§!。\n被强制参勤的大名将进入参勤途中，并降低独立倾向。完成任务§Y惩戒拒参§!后，效果增强。"
 shogun_weixin.i.k.tt:0 "除北海道外，日本地区必须由幕府体系控制。"
 shogun_weixin.i.a.tt:0 "解锁幕府外交行动：§Y狩野虾夷§!。现在，幕府将军可收服日本的最后一块版图：虾夷。\n\n将军获得：\n年度陆军传统：§G+1.00§!"
 shogun_weixin.j.k.tt:0 "已完成§Y身份统制§!、§Y禁中并公§!和§Y武家诸法§!。"
 shogun_weixin.j.a.tt:0 "诸家争端、旧家恢复和私战止息，皆应由公仪裁断。\n\n将军和天皇目标获得：\n外交声誉：§G+1§!\n全国叛乱：§G-1§!\n幕府外交接受度：§G+10§!\n\n完成任务§Y公仪裁断§!后，解锁§Y强制分割§!和§Y任命执行国§!。"
 shogun_weixin.k.k.tt:0 "已完成§Y公仪裁断§!。"
 shogun_weixin.k.a.tt:0 "国替令确立转封原则，使大名领国服从公仪安排。\n\n将军和天皇目标获得：\n州维护费：§G-10.0%§!\n全局自治度：§G-2.00§!\n属国独立倾向：§G-5.0%§!\n幕府外交接受度：§G+5§!\n\n§Y任命执行国§!的御统消耗降为§Y10§!。"
 shogun_weixin.l.k.tt:0 "已完成§Y国替令§!，且至少任命过一个§Y幕府执行国§!。"
 shogun_weixin.l.a.tt:0 "以目付、巡见使和执行国监察诸藩，使违令、私战与吞并旧家之事更难隐匿。\n\n将军和天皇目标获得：\n间谍网建设能力：§G+10.0%§!\n使节旅行时间：§G-20.0%§!\n幕府外交接受度：§G+5§!。"
