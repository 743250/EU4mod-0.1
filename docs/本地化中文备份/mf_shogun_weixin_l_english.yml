 shogun_yutong_monthly_value.tt:0 "影响每月§Y御统增长§!的因素：\n稳定度：[1020.Getshogun_monthly_value_1_PosNeg][1020.shogun_monthly_value_1.GetValue]§!\n大名数：§G+[1020.shogun_monthly_value_6.GetValue]§!\n正统性：[1020.Getshogun_monthly_value_7_PosNeg][1020.shogun_monthly_value_7.GetValue]§!\n整合度：[1020.Getshogun_monthly_value_8_PosNeg][1020.shogun_monthly_value_8.GetValue]§![Getshogun_monthly_value_2_PosNeg][Getshogun_monthly_value_3_PosNeg][Getshogun_monthly_value_4_PosNeg][Getshogun_monthly_value_5_PosNeg]"
 shogun_yutong_value.tt:0 "御统代表天皇或征夷大将军在日本内部的威望与统治秩序。御统可用于推进维新、颁布命令和执行幕府外交行动。\n---------------------\n当前御统给予以下修正：\n[1020.Getshogun_express_modifier]\n\n高于§Y50§!御统时，将按比例获得：\n全国叛乱度：§G-2.5§!\n年度正统性：§G+1.00§!\n附庸国进贡收入：§G+20%§!\n附庸贡献的陆军上限：§G+20%§!\n省份战争分数花费：§G-20%§!\n\n低于§Y50§!御统时，将按比例受到：\n全国叛乱度：§R+5.0§!\n年度正统性：§R-2.00§!\n税收收入修正：§R-50%§!\n附庸贡献的陆军上限：§R-50%§!\n属国独立倾向：§R+50%§!\n雇佣兵维护费：§R+100%§!\n陆军士气：§R-20%§!\n\n主要来源：稳定度、足够多的大名、高正统性、长期由同一家大名担任将军。\n主要损失：体系外国家控制日本领土、低稳定度、未控制日本列岛主要城市。"
 Getshogun_value_Profix.a.tt:0 "0[1020.shogun_value_Profix.GetValue]"
 Getshogun_value_Profix.b.tt:0 "[1020.shogun_value_Profix.GetValue]"
 Getshogun_express_modifier.b.tt:0 "全国叛乱度：§G-[1020.shogun_value_express_1.GetValue]§!\n年度正统性：§G+1.00§!\n附庸国进贡收入：§G+[1020.shogun_value_express_2.GetValue]%§!\n附庸贡献的陆军上限：§G+[1020.shogun_value_express_2.GetValue]%§!\n省份战争分数花费：§G-[1020.shogun_value_express_2.GetValue]%§!"
 Getshogun_express_modifier.a.tt:0 "全国叛乱度：§R+[1020.shogun_value_express_3.GetValue]§!\n年度正统性：§R-2.00§!\n税收收入修正：§R-[1020.shogun_value_express_6.GetValue]%§!\n附庸贡献的陆军上限：§R-[1020.shogun_value_express_6.GetValue]%§!\n属国独立倾向：§R+[1020.shogun_value_express_6.GetValue]%§!\n雇佣兵维护费：§R+[1020.shogun_value_express_5.GetValue]%§!\n陆军士气：§R-[1020.shogun_value_express_4.GetValue]%§!"
