l_english:
 shogun_tianhuang.tt:0 "天皇是幕府法理中的神权象征。将军以征夷大将军名义建立武家政权，但朝廷目标必须保持在幕府体系内，否则公仪名分会受到损害。"
 shogun_zhengyidajiangjun.tt:0 "征夷大将军的权威来自朝廷宣下，也来自对诸大名的实际统御。幕府需要维持京都、诸藩和核心秩序，才能让将军权威被承认。"
 shogun_xiayi.tt:0 "虾夷是幕府指定的共同征讨目标。完成相关维新后，将军可以指定体系外国家为虾夷目标，引导诸大名对外用兵。"
 shogun_gui_dip_icon.tt:0 "可用幕府外交行动：\n§Y狩野虾夷§![1020.Getshogun_jinzhongbingong_dip]"
 Getshogun_jinzhongbingong_dip.tt:0 "\n§Y宣下奉行§!"
