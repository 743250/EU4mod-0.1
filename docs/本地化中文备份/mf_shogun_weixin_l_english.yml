 haixiao:0 "海啸波及地区"
 mozhiyingwuzheyihui:0 "墨之影武者议会"
 zhuxiangzhigaige:0 "助乡制改革"
 kaikenzuqing:0 "开垦足轻"
 fengraozhimengsui:0 "丰穰之梦碎"
 qianghuahaijin:0 "强化海禁"
 xingxingxiangrong:0 "欣欣向荣"
 bl_japan.1_name:0 "关东大地震"
 bl_japan.1_desc:0 "关东诸国遭遇大地震，城市、道路和神社受损。幕府必须决定以多少御统维持救灾和地方秩序。"
 bl_japan.1.a:0 "赈灾，开仓赈灾！"
 bl_japan.1.a.tt:0 "[ROOT.GetName]减少§R10.00§!点御统。"
 bl_japan.1.b:0 "愿他们熬过这个时代。"
 bl_japan.1.b.tt:0 "[ROOT.GetName]减少§R20.00§!点御统。"
 bl_japan.2_name:0 "[GetYear]海啸"
 bl_japan.2_desc:0 "海啸冲击沿岸，海船、渔村和港口受损。幕府必须处理灾后秩序和沿海民生。"
 bl_japan.2.a:0 "最可怕的噩耗。"
 bl_japan.3_name:0 "将军御所的影武者"
 bl_japan.3_desc:0 "将军御所传出不祥流言，影武者与内府阴谋扰动诸藩视线。幕府必须处理这场政治危机。"
 bl_japan.3.a:0 "发动弱田门之变。"
 bl_japan.3.b:0 "维持傀儡将军。"
 bl_japan.3.b.tt:0 "[ROOT.GetName]增加§G10.00§!点御统。"
 bl_japan.4_name:0 "助乡制改革案"
 bl_japan.4_desc:0 "参勤、宿场和运输成本日益沉重，商人和地方代官提出助乡制改革案。幕府必须在稳定武家秩序和维持流通之间取舍。"
 bl_japan.4.a:0 "推行这项改革。"
 bl_japan.4.b:0 "有人想掏空我们的秩序。"
 bl_japan.5_name:0 "新田开垦议案"
 bl_japan.5_desc:0 "地方请求扩大新田开发。粮食、劳役和水利技术牵动诸藩财政，也可能引发新的地方冲突。"
 bl_japan.5.a:0 "御准此案。"
 bl_japan.6_name:0 "丰穰之梦碎"
 bl_japan.6_desc:0 "丰收预期被灾害、囤积和地方冲突击碎，农民与商人都开始质疑幕府调度。"
 bl_japan.6.a:0 "实施轮耕休养制。"
 bl_japan.7_name:0 "密贸易网络"
 bl_japan.7_desc:0 "沿海诸藩和商人网络私下接触海外货物。幕府必须决定是强化海禁，还是默许黑市存在。"
 bl_japan.7.a:0 "强化海禁。"
 bl_japan.7.b:0 "默许黑市。"
 bl_japan.8_name:0 "浮世绘冲击波"
 bl_japan.8_desc:0 "浮世绘、商贸纸品和城市审美快速传播，商品经济的影响力正在侵入幕府秩序。"
 bl_japan.8.a:0 "官方管制。"
 bl_japan.8.b:0 "官方维持。"
 bl_japan.9_name:0 "天皇家失去封地"
 bl_japan.9_desc:0 "天皇家已经失去原有封地，幕府需要从新的大名家系中选择一位天皇目标。"
 bl_japan.9.a:0 "随机挑选一位。"
