 Getweixin_trigger.b.tt:0 "§W- 该改革决议已经通过§!\n§R推行该项改革需要至少§Y80.00§!御统。\n-\n该改革决议花费§Y70.00§!御统，但当前只有§Y[1020.shogun_value_display.GetValue]§!御统。§!"
 Getweixin_trigger.c.tt:0 "§W- 该改革决议已经通过§!"
