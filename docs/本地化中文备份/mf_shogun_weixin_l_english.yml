 mf_sakoku_isolation:0 "闭关锁国"
 desc_mf_sakoku_isolation:0 "幕府以封闭秩序压制商品经济和藩国技术跃迁，使强藩难以凭外部交流在军事上超过将军。"
 jiujizhengshi_1:0 "参勤交代"
 desc_jiujizhengshi_1:0 "参勤交代迫使大名往返于将军城下，削弱诸藩公开抗命的余地。"
 jiujizhengshi_2:0 "参勤交代"
