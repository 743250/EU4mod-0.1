 shogun_yuling_x.tt:0 "每次只能颁布一项御令。御令持续§Y10年§!，颁布时消耗§Y20§!正统性。"
 shogun_yuling_x_a.tt:0 "将军获得§Y驱逐浪人§!：属国独立倾向§G-10%§!，全国叛乱度§G-2§!。"
 shogun_yuling_x_b.tt:0 "将军进入§Y参勤秩序§!：每年触发参勤交代事件，大名需要按发展度和到幕府首都的距离承担参勤费用。"
 shogun_yuling_x_c.tt:0 "所有直属大名和陪臣大名获得§Y幕府军攻压制§!：围城能力§R-30%§!。"
 shogun_yuling_x_d.tt:0 "将军获得§Y乐市乐座§!：省份贸易竞争力§G+20%§!，贸易效率§G+10%§!。"
 shogun_yuling_x_e.tt:0 "将军获得§Y兵农分离§!：步兵作战能力§G+10%§!，将领围城§G+2§!。"
