l_english:
 DIPLOMACYACTION_CATEGORY_shogun:0 "幕府外交"
 DIPLOMACYACTION_CATEGORY_:0 "幕府外交"
 mf_daimyo.10.t:0 "年度参勤交代"
 mf_daimyo.10.d:0 "年度参勤交代来自御令中的固定命令，而不是旧政府机制的临时开关。只要仍为幕府大名，来年仍会再次收到这类征召。\n\n今年[Root.GetName]需要筹措行列、宿营、护卫和礼仪开支。本次费用约为§Y[Root.mf_sankin_cost.GetValue]§!¤，按§Y3§!基础支出、总发展度和到幕府首都的距离估算；领国越大、距离越远，负担越重。接受后会在约六个月内处于参勤途中。若财政已被贷款压垮，可以请求暂缓；公开拒绝则会损害幕府御统，并给将军讨伐的理由。"
 mf_daimyo.10.a:0 "遵命上洛，承担年度参勤费用"
 mf_daimyo.10.a.tt:0 "支付本年度参勤费用：约§Y[Root.mf_sankin_cost.GetValue]§!¤。费用由§Y3§!基础支出、总发展度和至幕府首都的距离共同决定。\n获得§Y参勤交代途中§!6个月。"
 mf_daimyo.10.c:0 "以债务沉重为由请求暂缓"
 mf_daimyo.10.c.tt:0 "只有贷款不少于§Y5§!笔且独立倾向低于§Y50%§!时可请求暂缓。\n暂缓本年度参勤，不支付本次行列费用，但会失去威望、降低独立倾向，并招致邻近幕府大名不满。"
 mf_daimyo.10.b:0 "拒绝幕府的年度征召"
 mf_daimyo.10.b.tt:0 "公开违抗幕府命令。幕府御统§R-5§!，将军获得对我国的讨伐理由，并可随后使用§Y强制参勤交代§!外交行动。"
 mf_daimyo.11.t:0 "大名拒绝年度参勤交代"
 mf_daimyo.11.d:0 "一位大名拒绝履行年度参勤交代。此举动摇了幕府威信，也给了我们整肃其藩政的理由。"
 mf_daimyo.11.a:0 "此例不可纵容"
 mf_daimyo.12.t:0 "大名领地归还"
 mf_daimyo.12.d:0 "幕府勒令大名归还被吞并的领地。"
 mf_daimyo.12.a:0 "秩序必须恢复"
 mf_daimyo.13.t:0 "陪臣大名分封"
 mf_daimyo.13.d:0 "大名从自有领地中恢复旧家名，并将其纳入自己的陪臣体系。"
 mf_daimyo.13.a:0 "家中秩序得以重整"
 mf_daimyo.1.t:0 "旧式参勤交代"
 mf_daimyo.1.d:0 "旧版参勤交代事件已停用，仅作为移植参考保留。"
 mf_daimyo.1.a:0 "遵命"
 mf_daimyo.2.t:0 "地方分离"
 mf_daimyo.2.d:0 "旧版幕府分离事件已停用，仅作为移植参考保留。"
 mf_sankin_kotai_began:0 "参勤秩序"
 desc_mf_sankin_kotai_began:0 "御令把参勤交代变成每年的固定秩序：大名必须往返幕府，中央得以持续监督各藩，但政务与接待成本也随之上升。"
 mf_sankin_kotai_travel:0 "参勤交代途中"
 desc_mf_sankin_kotai_travel:0 "参勤队伍正在往返幕府。道路、宿场、护卫和礼仪开支牵动藩政，同时也暂时压低国内不稳。"
 mf_sankin_kotai_refused:0 "拒绝参勤交代"
 desc_mf_sankin_kotai_refused:0 "该大名公开拒绝履行参勤交代，幕府秩序受到了挑战。"
 mf_sankin_kotai_suspended:0 "暂缓参勤交代"
 desc_mf_sankin_kotai_suspended:0 "该大名以财政困难为由请求暂缓参勤交代，体面受损，国内也对幕府要求心怀不满。"
 mf_recently_returned_daimyo_land:0 "最近归还领地"
 mf_daimyo_authority_siege_restriction:0 "幕府统御压制"
 desc_mf_daimyo_authority_siege_restriction:0 "高统御下，幕府能够压低大名把战场优势转化为攻城扩张的效率，从而减缓大名互相吞并。"
 mf_daimyo_siege_restriction:0 "幕府军攻压制"
 desc_mf_daimyo_siege_restriction:0 "刀狩不是直接禁战，而是削弱大名把胜利迅速转成攻城扩张的能力，拖慢吞并节奏。"
 mf_shogun_institution_isolation:0 "幕府保守封闭"
 desc_mf_shogun_institution_isolation:0 "幕府本体更重视稳态和旧制，新思潮进入中枢的速度更慢，代价更高，但也更不容易在短期内推翻旧秩序。"
 mf_fudai_institution_isolation:0 "谱代幕政钳制"
 desc_mf_fudai_institution_isolation:0 "谱代大名更贴近幕府中枢，更容易被纳入统一秩序，因此吸收外部新思潮更慢，但地方控制也更稳。"
 mf_tozama_foreign_institution_learning:0 "外部思潮交流"
 desc_mf_tozama_foreign_institution_learning:0 "外样大名更接近外部国家和新思潮来源，成长更快，却也更容易离心和不安。"
 mf_tozama_foreign_adm_tech_learning:0 "外部行政交流"
 desc_mf_tozama_foreign_adm_tech_learning:0 "该外样大名已经发现距离不远的幕府体系外先进国家，因此能够更快吸收行政技术。"
 mf_tozama_foreign_dip_tech_learning:0 "外部外交交流"
 desc_mf_tozama_foreign_dip_tech_learning:0 "该外样大名已经发现距离不远的幕府体系外先进国家，因此能够更快吸收外交技术。"
 mf_tozama_foreign_mil_tech_learning:0 "外部军事交流"
 desc_mf_tozama_foreign_mil_tech_learning:0 "该外样大名已经发现距离不远的幕府体系外先进国家，因此能够更快吸收军事技术。"
 mf_subject_nation:0 "幕府体系属国"
 desc_mf_subject_nation:0 "该国处于幕府体系内，承担贡赋与军役，同时从幕府秩序中获得财政和维护优势。"
 mf_daimyo_nation:0 "大名领国"
 desc_mf_daimyo_nation:0 "大名领国受限于本家规模与幕府秩序，能够维持的常备军船数量有限。"
 mf_daimyo_subject:0 "亲幕府大名"
 desc_mf_daimyo_subject:0 "该大名被纳入更稳定的幕府统属关系，独立倾向受到压制。"
 mf_local_nationalism_against:0 "地方反抗"
 desc_mf_local_nationalism_against:0 "当地秩序仍未安定，旧有不满、宗教阻力和生产破坏拖累了省份治理。"
 mf_unlawful_daimyo_land:0 "非法的大名领地"
 desc_mf_unlawful_daimyo_land:0 "这块领地被幕府点名为非法占有，仍然拥有幕府体系内旧家的核心。"
 mf_shogunate_lecture:0 "幕府训诫"
 desc_mf_shogunate_lecture:0 "该大名受到幕府公开训诫，家中威望和统治稳定受到冲击。"
 mf_shogunate_grace:0 "幕府赦免"
 desc_mf_shogunate_grace:0 "该大名获得幕府赦免，暂时缓和了与将军的矛盾。"
 mf_shogunate_partitioned:0 "被幕府分割"
 desc_mf_shogunate_partitioned:0 "该大名被迫交出吞并的旧家领地，家中秩序动荡。"
 mf_shogunate_executor:0 "幕府执行国"
 desc_mf_shogunate_executor:0 "该大名被任命为幕府执行国，承担执行幕府裁决的职责。"
 mf_shogunate_excommunication:0 "幕府绝罚"
 desc_mf_shogunate_excommunication:0 "该大名被幕府以朝命名义绝罚，威望、外交声誉和国内秩序都受到沉重打击。"
 daimyo_vassal:0 "外样大名"
 daimyo_vassal_title:0 "外样大名"
 daimyo_vassal_title_plural:0 "外样大名"
 daimyo_vassal_is_our:0 "§Y$NAME$§!是我们的外样大名。"
 daimyo_vassal_long_desc:0 "外样大名是幕府体系内保留较多地方自主权的大名。他们直属于将军，可以在幕府秩序内竞争，但不能被外交吞并。"
 mf_daimyo_vassal:0 "谱代大名"
 mf_daimyo_vassal_title:0 "谱代大名"
 mf_daimyo_vassal_title_plural:0 "谱代大名"
 mf_daimyo_vassal_is_our:0 "§Y$NAME$§!是我们的谱代大名。"
 mf_daimyo_vassal_long_desc:0 "谱代大名是亲近幕府中枢的大名。他们在外交上拥有更少主权，不可主动宣战，可以被幕府体系纳入更稳定的统属关系。"
 mf_daimyo:0 "谱代大名"
 mf_daimyo_desc:0 "谱代大名是更贴近幕府中枢的大名，直属于将军并承担维持幕府秩序的责任。"
 mf_retainer_daimyo_vassal:0 "陪臣大名"
 mf_retainer_daimyo_vassal_title:0 "陪臣大名"
 mf_retainer_daimyo_vassal_title_plural:0 "陪臣大名"
 mf_retainer_daimyo_vassal_is_our:0 "§Y$NAME$§!是我们的陪臣大名。"
 mf_retainer_daimyo_vassal_long_desc:0 "陪臣大名是在战国私战或家中分封中臣服于其他大名的下级大名。他们仍保留本家领国，但作为大名内政层存在，不能主动发动对外战争，不过仍可以发动独立战争并请求支持独立。"
 mf_shogunate_diplomatic_acceptance:0 "幕府外交接受度"
 mf_shogunate_order_authority_5_tt:0 "幕府至少需要§Y5§!点御统。"
 mf_shogunate_order_authority_10_tt:0 "幕府至少需要§Y10§!点御统。"
 mf_shogunate_order_authority_20_tt:0 "幕府至少需要§Y20§!点御统。"
 mf_shogunate_order_authority_25_tt:0 "幕府至少需要§Y25§!点御统。"
 mf_shogunate_order_target_development:0 "目标大名规模"
 mf_shogun_cannot_annex_subjects_tt:0 "幕府将军不能吞并或合并属国，只能通过属国互动没收或给予省份。"
 xuanxiafengxing:0 "宣下奉行"
 xuanxiafengxing_title:0 "宣下奉行"
 xuanxiafengxing_tooltip:0 "指定新的天皇目标。"
 xuanxiafengxing_desc:0 "将一个幕府属下大名改立为新的天皇目标。该行动需要完成§Y禁中并公§!，花费§Y10§!点御统，并有§Y10§!年冷却。"
 xuanxiafengxing.a.tt:0 "冷却 10 年。"
 mf_xuanxiafengxing_authority_tt:0 "幕府至少需要§Y10§!点御统。"
 mf_xuanxiafengxing_cooldown_tt:0 "距离上次宣下奉行已经过去§Y10§!年。"
 mf_ai_xuanxiafengxing_title:0 "AI 宣下奉行"
 mf_ai_xuanxiafengxing_desc:0 "幕府 AI 在合适条件下重新指定天皇目标。"
 shouyexiayi:0 "狩野虾夷"
 shouyexiayi_title:0 "狩野虾夷"
 shouyexiayi_tooltip:0 "指定一个接壤幕府体制国家的体系外国家为虾夷。"
 shouyexiayi_desc:0 "将目标指定为虾夷征讨对象。幕府及其大名攻占虾夷省份时，有§Y20%§!概率获得该省份核心；与虾夷目标交战时，获得§Y10%§!陆军士气和§Y10%§!人力恢复速度。"
 shouyexiayi.a.tt:0 "§Y10§!年内只能指定一个虾夷国。"
 neighbor_subject.tt:0 "该国邻接至少一个幕府体系国家。"
 mf_shouyexiayi_cooldown_tt:0 "§Y10§!年内只能指定一个虾夷国。"
 mf_shouyexiayi_neighbor_tt:0 "目标必须邻接至少一个幕府体系国家。"
 mf_shouyexiayi_hokkaido_tt:0 "任务§Y平定虾夷§!完成前，目标必须拥有至少一个北海道省份。"
 mf_ai_shouyexiayi_title:0 "AI 狩野虾夷"
 mf_ai_shouyexiayi_desc:0 "幕府 AI 在合适条件下指定虾夷征讨目标。"
 mf_convert_daimyo:0 "指定谱代大名"
 mf_convert_daimyo_title:0 "指定谱代大名"
 mf_convert_daimyo_desc:0 "将一个规模较小、仍可倚任的大名列为谱代大名。谱代大名更接近幕府中枢，但幕府能够维持的谱代数量有限。"
 mf_convert_daimyo_tooltip:0 "将该大名指定为谱代大名。"
 mf_convert_daimyo_neighbor_tt:0 "目标大名必须与幕府直接接壤。"
 mf_convert_daimyo_small_daimyo_tt:0 "目标大名的发展度低于§Y100§!，且拥有少于§Y5§!座城市。"
 mf_convert_daimyo_limit_tt:0 "幕府当前拥有少于§Y3§!个谱代大名；完成任务§Y谱代中枢§!后上限提高到§Y5§!。"
 mf_lecture_daimyo:0 "训诫大名"
 mf_lecture_daimyo_title:0 "训诫大名"
 mf_lecture_daimyo_tooltip:0 "以幕府权威训诫该大名。"
 mf_lecture_daimyo_desc:0 "完成任务§Y整理诸家名帐§!后，幕府可以对违逆秩序的大名下达训诫。该行动基础消耗§Y5§!点御统；完成§Y四民安堵§!后消耗降为§Y3§!点。"
 mf_lecture_daimyo_cooldown_tt:0 "该大名距离上次受训诫已经过去§Y5§!年。"
 mf_bestow_shogunate_grace:0 "赦免大名"
 mf_bestow_shogunate_grace_title:0 "赦免大名"
 mf_bestow_shogunate_grace_tooltip:0 "赦免该大名，并恢复其与幕府的关系。"
 mf_bestow_shogunate_grace_desc:0 "完成任务§Y整理诸家名帐§!后，幕府可以以赦免和恩赏安抚该大名。该行动基础消耗§Y5§!点御统；完成§Y四民安堵§!后消耗降为§Y3§!点。"
 mf_enforce_sankin_kotai:0 "强制参勤交代"
 mf_enforce_sankin_kotai_title:0 "强制参勤交代"
 mf_enforce_sankin_kotai_desc:0 "该大名拒绝了参勤交代。幕府可以强制其履行义务，并要求其完成参勤行列。"
 mf_enforce_sankin_kotai_tooltip:0 "强制拒绝参勤交代的大名履行义务。"
 mf_enforce_sankin_kotai_refused_tt:0 "目标大名最近拒绝过参勤交代。"
 mf_enforce_daimyo_peace:0 "强制和平"
 mf_enforce_daimyo_peace_title:0 "强制和平"
 mf_enforce_daimyo_peace_tooltip:0 "要求该大名停止对幕府体系内其他大名的进攻。"
 mf_enforce_daimyo_peace_desc:0 "完成任务§Y编定武家法度§!后，幕府可以命令该大名停止对幕府体系内其他大名的进攻。目标接受时基础消耗§Y10§!御统，完成§Y止息诸家私战§!后降为§Y5§!；目标拒绝时幕府加入被攻击大名的防御战争，并消耗§Y10§!御统。"
 mf_enforce_daimyo_peace_target_tt:0 "目标必须正在作为进攻方攻击另一个幕府直属大名。"
 mf_return_daimyo_land:0 "要求归还领地"
 mf_return_daimyo_land_title:0 "要求归还领地"
 mf_return_daimyo_land_desc:0 "完成任务§Y编定武家法度§!后，幕府可以要求该大名归还其在私战中吞并、且仍有已灭亡大名核心的领土。目标接受时省份归还旧家、幕府御统§G+2§!；完成§Y恢复旧家秩序§!后提升为§G+5§!。目标拒绝时省份获得非法领地惩罚，幕府御统§R-2§!并获得归还领地战争借口。"
 mf_return_daimyo_land_tooltip:0 "要求扩张过度的大名归还被吞并的领地。"
 mf_return_daimyo_land_has_land_tt:0 "目标大名拥有至少一个仍有已灭亡旧家核心的省份。"
 mf_return_daimyo_land_high_authority:0 "幕府统御极高"
 mf_return_daimyo_land_good_authority:0 "幕府统御较高"
 mf_return_daimyo_land_weak_authority:0 "幕府统御不足"
 mf_return_daimyo_land_dominant_shogun:0 "幕府军力压倒目标"
 mf_return_daimyo_land_stronger_shogun:0 "幕府军力强于目标"
 mf_return_daimyo_land_strong_daimyo:0 "目标大名军力强盛"
 mf_return_daimyo_land_dominant_daimyo:0 "目标大名军力压倒幕府"
 mf_return_daimyo_land_recent_return:0 "最近已经归还过领地"
 mf_release_daimyo_from_shogun_land_title:0 "重新分封大名"
 mf_release_daimyo_from_shogun_land_desc:0 "从幕府直辖的日本领土中选择一个仍有已灭亡国家核心的省份，恢复该家名并纳入幕府体系。"
 mf_release_daimyo_from_shogun_land_tooltip:0 "释放一个已灭亡大名，使其成为幕府属下大名。"
 mf_release_daimyo_shogun_value_tt:0 "恢复已灭亡大名的旧家秩序，幕府御统§G+2§!。"
 mf_release_retainer_daimyo_from_land_title:0 "分封陪臣大名"
 mf_release_retainer_daimyo_from_land_desc:0 "从本家自有的日本领土中选择一个仍有已灭亡国家核心的省份，恢复该家名并纳入陪臣体系。陪臣大名不能主动发动战争，也不能发动独立战争。"
 mf_release_retainer_daimyo_from_land_tooltip:0 "释放一个已灭亡旧家，使其成为本家的陪臣大名。"
 mf_demand_partition_daimyo:0 "强制分割"
 mf_demand_partition_daimyo_title:0 "强制分割"
 mf_demand_partition_daimyo_tooltip:0 "要求该大名释放被其吞并的旧家领地。"
 mf_demand_partition_daimyo_desc:0 "完成任务§Y公仪裁断§!后，幕府可以命令过度扩张的大名交出旧家核心，恢复被吞并的家名。目标接受时消耗§Y15§!御统；目标拒绝时幕府消耗§Y25§!御统并获得强制分割战争借口。"
 mf_demand_partition_daimyo_land_tt:0 "目标至少持有§Y3§!个非首都、且仍有已灭亡旧家核心的省份。"
 mf_appoint_executor_daimyo:0 "任命执行国"
 mf_appoint_executor_daimyo_title:0 "任命执行国"
 mf_appoint_executor_daimyo_tooltip:0 "任命该大名为幕府执行国。"
 mf_appoint_executor_daimyo_desc:0 "完成任务§Y公仪裁断§!后，幕府可以任命一个大名为执行国，令其成为谱代大名并承担执行幕府裁决的责任。该行动基础消耗§Y20§!御统，完成§Y国替令§!后降为§Y10§!；目标拒绝时幕府获得强制任命战争借口。"
 mf_appoint_executor_daimyo_size_tt:0 "目标发展度必须低于§Y300§!。"
 mf_excommunicate_daimyo:0 "绝罚大名"
 mf_excommunicate_daimyo_title:0 "绝罚大名"
 mf_excommunicate_daimyo_tooltip:0 "以朝命名义绝罚拒命大名。"
