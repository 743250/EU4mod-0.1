l_english:
 mf_shogun_missions_authority_title:0 "公方秩序"
 mf_shogun_missions_authority_desc:0 "稳定内政、整顿身份秩序，并以闭关政策巩固幕府统御。"
 mf_shogun_missions_court_title:0 "朝廷法理"
 mf_shogun_missions_court_desc:0 "重建朝廷名分，使将军命令得到公武共同承认。"
 mf_shogun_missions_law_title:0 "参勤法度"
 mf_shogun_missions_law_desc:0 "以参勤、武家诸法和执行国制度约束诸大名。"
 mf_shogun_missions_domains_title:0 "领地监察"
 mf_shogun_missions_domains_desc:0 "检定土地、恢复旧家，并以谱代与监察网重整领国。"
 mf_shogun_missions_learning_title:0 "对外扩张"
 mf_shogun_missions_learning_desc:0 "本土安定之后，幕府可将诸藩军役导向海外。"
 mf_shogun_requires_identity_control_tt:0 "需要完成维新改革§Y身份统制§!。"
 mf_shogun_requires_court_channel_reform_tt:0 "需要完成维新改革§Y禁中并公§!。"
 mf_shogun_requires_buke_law_reform_tt:0 "需要完成维新改革§Y武家诸法§!。"
 mf_shogun_requires_public_arbitration_reform_tt:0 "需要完成维新改革§Y公仪裁断§!。"
 mf_shogun_requires_domain_transfer_reform_tt:0 "需要完成维新改革§Y国替令§!。"
 mf_shogun_requires_inspection_reform_tt:0 "需要完成维新改革§Y诸藩监察§!。"
 mf_shogun_requires_learning_reform_tt:0 "需要完成维新改革§Y征讨虾夷§!。"
 mf_shogun_requires_sakoku_policy_tt:0 "需要完成维新改革§Y闭关锁国§!。"
 mf_shogun_requires_sankin_reform_tt:0 "需要完成维新改革§Y参勤交代§!。"
 mf_shogun_requires_fudai_reform_tt:0 "需要完成维新改革§Y谱代大名§!。"
 mf_shogun_requires_bakuryo_cadastral_survey_tt:0 "需要完成维新改革§Y幕领检地§!，并已设立天皇目标。"
 mf_shogun_requires_private_barrier_reform_tt:0 "需要完成维新改革§Y废除私关§!。"
 mf_shogun_requires_late_reforms_tt:0 "需要完成维新改革§Y征讨虾夷§!、§Y公仪裁断§!、§Y国替令§!和§Y诸藩监察§!。"
 mf_shogun_requires_buke_law_mission_tt:0 "需要完成任务§Y编定武家法度§!。"
 mf_shogun_requires_house_rolls_mission_tt:0 "需要完成任务§Y整理诸家名帐§!。"
 mf_shogun_requires_court_arbitration_mission_tt:0 "需要完成任务§Y公仪裁断§!。"
 mf_shogun_requires_ezo_target_tt:0 "需要先通过§Y狩野虾夷§!指定当前虾夷征讨目标。"
 mf_shogun_requires_forced_sankin_tt:0 "需要至少成功强制一个拒参大名参加参勤交代。"
 mf_shogun_requires_excommunication_used_tt:0 "需要至少对一个拒命大名执行过§Y绝罚大名§!。"
 mf_shogunate_order_authority_lecture_tt:0 "幕府需要至少§Y5§!点御统；完成任务§Y四民安堵§!后只需要§Y3§!点御统。"
 mf_shogun_unlock_lecture_grace_tt:0 "解锁幕府外交行动：§Y训诫大名§!、§Y赦免大名§!。二者基础消耗§Y5§!御统；完成任务§Y四民安堵§!后消耗降为§Y3§!御统。"
 mf_shogun_unlock_law_orders_tt:0 "解锁幕府外交行动：§Y要求归还领地§!、§Y强制和平§!。\n§Y要求归还领地§!：目标接受时御统§G+2§!；完成§Y恢复旧家秩序§!后改为§G+5§!。目标拒绝时御统§R-2§!，幕府获得归还领地战争借口。\n§Y强制和平§!：基础消耗§Y10§!御统；完成§Y止息诸家私战§!后，目标接受时消耗降为§Y5§!。"
 mf_shogun_unlock_arbitration_orders_tt:0 "解锁幕府外交行动：§Y强制分割§!、§Y任命执行国§!。\n§Y强制分割§!：目标接受时消耗§Y25§!御统；完成§Y公仪裁断§!后降为§Y15§!。\n§Y任命执行国§!：基础消耗§Y20§!御统；完成§Y国替令§!后降为§Y10§!。目标拒绝时，幕府获得对应战争借口。"
 mf_shogun_abolish_private_barriers_title:0 "废除私关"
 mf_shogun_abolish_private_barriers_desc:0 "诸藩私关阻断道路与宿场。幕府应废除这些关卡，使国内流通重新服从公仪。"
 mf_shogun_abolish_private_barriers_tt:0 "幕府开始收回国内流通权。"
 mf_shogun_reaffirm_kubou_title:0 "重申公方秩序"
 mf_shogun_reaffirm_kubou_desc:0 "将军家必须重申公方秩序。稳定、合法性、御统与直属大名数量，是诸家承认幕府裁断的根本。"
 mf_shogun_house_rolls_title:0 "整理诸家名帐"
 mf_shogun_house_rolls_desc:0 "将大名家格、席次和从属关系记入名帐。诸家既列名其中，幕府便可训诫或赦免。"
 mf_shogun_buke_relief_after_sakoku_title:0 "抚恤武家"
 mf_shogun_buke_relief_after_sakoku_desc:0 "闭关之后，武家阶层仍需安堵。幕府将扩大武士军役名额，并承担更高的补员开支。"
 mf_shogun_buke_relief_after_sakoku_tt:0 "获得长期修正：§Y武家安堵§!，武士兵团数量提高，但补员花费上升。"
 mf_shogun_four_estates_peace_title:0 "四民安堵"
 mf_shogun_four_estates_peace_desc:0 "身份秩序已逐渐安定，百姓与诸藩皆应服从幕府法度。"
 mf_shogun_four_estates_peace_tt:0 "§Y训诫大名§!与§Y赦免大名§!的御统消耗降为§Y3§!。"
 mf_shogun_restore_court_channel_title:0 "禁中并公"
 mf_shogun_restore_court_channel_desc:0 "整顿朝廷礼仪、任官与裁断通道，使将军命令重新取得朝廷名分。"
 mf_shogun_court_arbitration_title:0 "公仪裁断"
 mf_shogun_court_arbitration_desc:0 "朝廷通道、名帐和法度齐备后，幕府可将诸家争端交由公仪裁断。"
 mf_shogun_imperial_excommunication_title:0 "朝命绝罚"
 mf_shogun_imperial_excommunication_desc:0 "天皇目标可为幕府裁断提供朝命名分。严重违抗幕府的大名，将受朝命绝罚。"
 mf_shogun_excommunication_system_tt:0 "解锁幕府外交行动：§Y绝罚大名§!。\n§Y绝罚大名§!会使目标失去§R100§!威望，获得§Y10§!年外交声誉惩罚，并给予幕府绝罚战争借口。"
 mf_shogun_kuge_buke_legal_order_title:0 "公武法理"
 mf_shogun_kuge_buke_legal_order_desc:0 "朝廷名分与武家法度相互支撑，幕府裁断由此成为公武共同承认的法理。"
 mf_shogun_kuge_buke_legal_order_tt:0 "幕府裁断获得更高法理承认。"
 mf_shogun_codify_buke_law_title:0 "编定武家法度"
 mf_shogun_codify_buke_law_desc:0 "武家诸法应成为诸大名共同遵守的法度。法度成形后，幕府可要求归还领地并强制和平。"
 mf_shogun_enforce_peace_order_title:0 "止息诸家私战"
 mf_shogun_enforce_peace_order_desc:0 "诸家私战必须止息。幕府应以武家法度约束大名之间的战争。"
 mf_shogun_punish_sankin_refusal_title:0 "惩戒拒参"
 mf_shogun_punish_sankin_refusal_desc:0 "拒绝参勤者必须受惩。幕府应以惩戒维护参勤交代的威严。"
 mf_shogun_sankin_punishment_upgraded_tt:0 "§Y强制参勤交代§!降低独立倾向的效果提高到§G-30%§!。"
 mf_shogun_executor_system_title:0 "确立执行国"
 mf_shogun_executor_system_desc:0 "执行国负责监督和执行幕府裁决，使公仪命令得以落到地方。"
 mf_shogun_one_lord_one_master_title:0 "一国一主"
 mf_shogun_one_lord_one_master_desc:0 "一国不应有二主。直属大名可以保留被承认的陪臣大名，但不得另立私属国网络。"
 mf_shogun_one_lord_one_master_tt:0 "幕府清理异常属国层级，并提高监察收益。"
 mf_shogun_bakuryo_cadastral_survey_title:0 "幕领检地"
 mf_shogun_bakuryo_cadastral_survey_desc:0 "检地将日本土地账册纳入幕府与朝廷名分之下。幕府由此取得日本地区的主权宣称。"
 mf_shogun_bakuryo_claims_tt:0 "获得日本地区永久宣称。"
 mf_shogun_recover_old_houses_title:0 "恢复旧家秩序"
 mf_shogun_recover_old_houses_desc:0 "旧家不应永远消失在胜者领地之中。幕府应恢复旧家名分，维持诸家秩序。"
 mf_shogun_transfer_domains_title:0 "推行国替"
 mf_shogun_transfer_domains_desc:0 "国替令使大名明白，领国并非不可挪动的私产。幕府可重新安排危险的地方势力。"
 mf_shogun_fudai_central_council_title:0 "谱代中枢"
 mf_shogun_fudai_central_council_desc:0 "谱代大名是将军家的中枢支柱。任命足够谱代后，幕府可扩大谱代名额。"
 mf_shogun_fudai_cap_5_tt:0 "§Y指定谱代大名§!上限提高到§Y5§!。"
 mf_shogun_inspection_network_title:0 "诸藩监察网"
 mf_shogun_inspection_network_desc:0 "目付、巡见使和执行国共同监察诸藩，使违令与私战更早暴露。"
 mf_shogun_ordered_realm_title:0 "诸国归于公仪"
 mf_shogun_ordered_realm_desc:0 "后期改革既成，诸大名仍承认幕府裁断。诸国由此归于公仪。"
 mf_shogun_school_of_order_title:0 "本土安定"
 mf_shogun_school_of_order_desc:0 "北海道以外的日本本土已入幕府秩序。诸藩军役可转向北方。"
 mf_shogun_ezo_campaign_title:0 "定虾夷征讨"
 mf_shogun_ezo_campaign_desc:0 "幕府已指定虾夷征讨目标。将军与诸大名应以此为共同北方军役。"
 mf_shogun_pacify_ezo_title:0 "平定虾夷"
 mf_shogun_pacify_ezo_desc:0 "北海道已归入幕府秩序。北方安定后，幕府可将虾夷征讨扩展到更远边境。"
 mf_shogun_ezo_scope_expanded_tt:0 "§Y狩野虾夷§!现在可指定更多体系外边境国家。"
 mf_shogun_subdue_ryukyu_title:0 "抚绥琉球"
 mf_shogun_subdue_ryukyu_desc:0 "琉球处于日本南方海路要冲。幕府应通过直辖、属国、盟约或友好关系将其纳入海上秩序。"
 mf_shogun_ryukyu_claims_tt:0 "获得琉球方向永久宣称。"
 mf_shogun_korean_campaign_title:0 "朝鲜通交或征伐"
 mf_shogun_korean_campaign_desc:0 "朝鲜方向可成为诸藩共同军役与通交出口。幕府应在此建立稳定影响。"
 mf_shogun_korea_claims_tt:0 "获得朝鲜地区永久宣称。"
 mf_shogun_china_campaign_title:0 "天朝秩序"
 mf_shogun_china_campaign_desc:0 "若公仪权威已能越海而行，幕府便可与天朝秩序分庭抗礼。"
 mf_shogun_china_campaign_tt:0 "获得永久修正：§Y天朝秩序§!。"
 mf_mission_kubou_order:0 "重申公方秩序"
 desc_mf_mission_kubou_order:0 "将军家重新证明了自己仍能维持诸家承认的秩序。"
 mf_mission_daimyo_rolls:0 "诸家名帐"
 desc_mf_mission_daimyo_rolls:0 "大名家格、席次和从属关系被纳入幕府记录，诸家更难以私意违背公仪。"
 mf_mission_samurai_relief:0 "武家安堵"
 desc_mf_mission_samurai_relief:0 "闭关后幕府安抚武士阶层，扩大武士兵团名额，同时承担更高补员花费。"
 mf_mission_four_estates_peace:0 "四民安堵"
 desc_mf_mission_four_estates_peace:0 "身份秩序和闭关政策暂时压低了诸藩离心与地方动乱。"
 mf_mission_court_channel:0 "朝廷通道"
 desc_mf_mission_court_channel:0 "幕府重新整理了与朝廷之间的礼仪、任官和裁断通道。"
 mf_mission_court_arbitration:0 "公仪裁断"
 desc_mf_mission_court_arbitration:0 "诸大名争端被纳入幕府裁断，命令更容易被视为制度而非私意。"
 mf_mission_buke_law:0 "武家法度"
 desc_mf_mission_buke_law:0 "武家诸法已成为诸大名共同遵守的法度。"
 mf_mission_private_war_settlement:0 "私战止息"
 desc_mf_mission_private_war_settlement:0 "幕府暂时压下诸家私战，武家法度获得了实际威信。"
 mf_mission_executor_system:0 "执行国制度"
 desc_mf_mission_executor_system:0 "幕府已经确立执行国，让裁断命令能够落到地方。"
 mf_mission_old_houses:0 "旧家秩序"
 desc_mf_mission_old_houses:0 "被吞并的旧家重新进入幕府记录，地方领国仍受公仪约束。"
 mf_mission_domain_transfer:0 "国替秩序"
 desc_mf_mission_domain_transfer:0 "国替令削弱了大名长期盘踞一地的根基，使幕府能重排危险的地方势力。"
 mf_mission_inspection_network:0 "诸藩监察网"
 desc_mf_mission_inspection_network:0 "目付、巡见使和执行国共同监督诸藩。"
 mf_mission_ordered_realm:0 "诸国归于公仪"
 desc_mf_mission_ordered_realm:0 "诸国承认幕府裁断，公仪秩序得以长久维持。"
 mf_mission_school_of_order:0 "本土安定"
 desc_mf_mission_school_of_order:0 "北海道以外的本土秩序已经稳定，诸藩军役可转向北方。"
 mf_mission_ezo_campaign:0 "虾夷征讨"
 desc_mf_mission_ezo_campaign:0 "幕府已将虾夷列为共同征讨目标，诸大名可在北方积累军役经验。"
 mf_mission_ezo_pacification:0 "平定虾夷"
 desc_mf_mission_ezo_pacification:0 "北海道进入幕府秩序后，北方征讨经验增强了幕府军政威望。"
 mf_mission_ryukyu_outreach:0 "琉球通路"
 desc_mf_mission_ryukyu_outreach:0 "琉球方向的海上联系被纳入幕府视野，贸易与海军秩序得到强化。"
 mf_mission_korea_campaign:0 "朝鲜方向"
 desc_mf_mission_korea_campaign:0 "朝鲜方向成为幕府体系共同外战与军役出口。"
 mf_mission_china_order:0 "天朝秩序"
 desc_mf_mission_china_order:0 "幕府已经证明自身秩序能够投射到东亚大陆方向。"
