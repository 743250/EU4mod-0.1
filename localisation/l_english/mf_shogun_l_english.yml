 mf_convert_daimyo:0 "指定谱代大名"
 mf_convert_daimyo_title:0 "指定谱代大名"
 mf_convert_daimyo_desc:0 "将一个规模较小、仍可倚任的大名列为谱代大名。谱代大名更接近幕府中枢，但幕府能够维持的谱代数量有限。"
 mf_convert_daimyo_tooltip:0 "将该大名指定为谱代大名。"
 mf_convert_daimyo_neighbor_tt:0 "目标大名必须与幕府直接接壤。"
 mf_convert_daimyo_small_daimyo_tt:0 "目标大名的发展度低于§Y100§!，且拥有少于§Y5§!座城市。"
 mf_convert_daimyo_limit_tt:0 "幕府当前拥有少于§Y3§!个谱代大名。"
 mf_enforce_sankin_kotai:0 "强制参勤交代"
 mf_enforce_sankin_kotai_title:0 "强制参勤交代"
 mf_enforce_sankin_kotai_desc:0 "该大名拒绝了参勤交代。幕府可以强制其履行义务，并要求其完成参勤行列。"
 mf_enforce_sankin_kotai_tooltip:0 "强制拒绝参勤交代的大名履行义务。"
 mf_enforce_sankin_kotai_refused_tt:0 "目标大名最近拒绝过参勤交代。"
 mf_return_daimyo_land:0 "要求归还领地"
 mf_return_daimyo_land_title:0 "要求归还领地"
 mf_return_daimyo_land_desc:0 "要求该大名归还其在私战中吞并、且仍有已灭亡大名核心的领土。"
 mf_return_daimyo_land_tooltip:0 "要求扩张过度的大名归还被吞并的领地。"
 mf_return_daimyo_land_has_land_tt:0 "目标大名拥有至少一个仍有已灭亡国家核心的省份。"
 mf_release_daimyo_from_shogun_land_title:0 "重新分封大名"
 mf_release_daimyo_from_shogun_land_desc:0 "从幕府直辖的日本领土中选择一个仍有已灭亡国家核心的省份，恢复该家名并纳入幕府体系。"
 mf_release_daimyo_from_shogun_land_tooltip:0 "释放一个已灭亡大名，使其成为幕府属下大名。"
 mf_release_retainer_daimyo_from_land_title:0 "分封陪臣大名"
 mf_release_retainer_daimyo_from_land_desc:0 "从本家自有的日本领土中选择一个仍有已灭亡国家核心的省份，恢复该家名并纳入陪臣体系。陪臣大名不能主动发动战争，也不能发动独立战争。"
 mf_release_retainer_daimyo_from_land_tooltip:0 "释放一个已灭亡旧家，使其成为本家的陪臣大名。"
