 shogun_yuling_x.tt:0 "每次只能颁布一项御令。御令持续§Y10年§!，颁布时消耗§Y20§!正统性。"
 shogun_yuling_x_a.tt:0 "将军获得§Y驱逐浪人§!：属国独立倾向§G-10%§!，全国叛乱度§G-2§!。"
 shogun_yuling_x_b.tt:0 "将军进入§Y参勤秩序§!：每年触发参勤交代事件，大名需要按发展度和到幕府首都的距离承担参勤费用。"
 shogun_yuling_x_c.tt:0 "所有直属大名和陪臣大名获得§Y幕府军攻压制§!：围城能力§R-30%§!。"
 shogun_yuling_x_d.tt:0 "将军获得§Y乐市乐座§!：省份贸易竞争力§G+20%§!，贸易效率§G+10%§!。"
 shogun_yuling_x_e.tt:0 "将军获得§Y兵农分离§!：步兵作战能力§G+10%§!，将领围城§G+2§!。"
 quzhulangren:0 "驱逐浪人"
 desc_quzhulangren:0 "把流散的浪人重新纳入家臣与地方秩序，压低游离武装和临时结党，先稳住内部再谈扩张。"
 leshilezuo:0 "乐市乐座"
 desc_leshilezuo:0 "放宽市座与商贸限制，把财富导向幕府可控的城镇和商路，增强财政与流通，也让地方经济更活跃、更难被旧制锁死。"
 bingnongfenli:0 "兵农分离"
 desc_bingnongfenli:0 "把武人与农民的角色拆开，便于维持常备武力和攻城压制；代价是社会结构更僵硬，地方张力也更高。"
 shogun_weixin.a_title:0 "废除关卡"
 shogun_weixin.b_title:0 "幕领检地"
 shogun_weixin.c_title:0 "身份统制"
 shogun_weixin.d_title:0 "禁中并公"
 shogun_weixin.e_title:0 "货币统一"
 shogun_weixin.f_title:0 "武家诸法"
 shogun_weixin.g_title:0 "农本商末"
 shogun_weixin.h_title:0 "救恤政施"
 shogun_weixin.i_title:0 "学问统制"
 shogun_weixin.f.a.tt:0 "以武家诸法重整大名秩序，强化幕府对大名和陪臣的控制。\n\n将军及幕府直属大名获得：\n 允许使用原版§Y转移属国§!和谈条款。\n\n完成该改革后，幕府与大名重新分封已灭亡旧家时，不再局限于日本区域。"
 shogun_weixin.g.a.tt:0 "整顿农业生产、商路和贡赋体系，让地方经济回到幕府可以统计和调度的秩序中。\n\n将军、天皇目标和幕府直属大名获得：\n 全局商品生产：§G+10.0%§!\n 生产效率：§G+10.0%§!"
