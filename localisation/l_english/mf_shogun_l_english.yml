 mf_xiayi_conquest_wg_desc:0 "战争目标是夺取虾夷领土。"
 mf_xiayi_campaign_wg:0 "收服为大名"
 mf_xiayi_campaign_wg_desc:0 "战争目标是占领敌方首都，并在和约中将其收服为幕府直属大名。"
 po_mf_subjugate_xiayi_daimyo:0 "收服为大名"
