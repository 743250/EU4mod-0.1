 xuanxiafengxing_tooltip:0 "指定新的天皇家族。"
 xuanxiafengxing_desc:0 "将一个幕府属下大名改立为新的天皇目标。该行动需要完成§Y禁中并公§!，花费§Y10§!点御统值，并有§Y10§!年冷却。"
 mf_xuanxiafengxing_authority_tt:0 "幕府至少需要§Y10§!点御统值。"
 mf_xuanxiafengxing_cooldown_tt:0 "距离上次宣下奉行已经过去§Y10§!年。"
 shouyexiayi:0 "狩野虾夷"
 shouyexiayi_title:0 "狩野虾夷"
 shouyexiayi_tooltip:0 "指定一个幕府体系外的邻近国家为虾夷。"
 shouyexiayi_desc:0 "将目标指定为虾夷征讨对象。幕府及其大名攻占虾夷省份时，有§Y20%§!概率获得该省份核心；在目标存续期间，幕府及其大名获得§Y10%§!陆军士气。"
 mf_shouyexiayi_cooldown_tt:0 "§Y10§!年内只能指定一个虾夷国。"
 mf_shouyexiayi_neighbor_tt:0 "目标必须邻接至少一个幕府属下大名。"
 mf_xiayi_campaign:0 "虾夷征讨"
 desc_mf_xiayi_campaign:0 "幕府已指定虾夷为共同征讨目标，诸大名正在整备军势。"
 mf_xiayi_campaign_modifier:0 "虾夷征讨"
 desc_mf_xiayi_campaign_modifier:0 "幕府已经指定虾夷目标。只要该目标仍存在且尚未纳入幕府体系，将军、直属大名和陪臣大名都会维持征讨动员。"
 cb_mf_xiayi_campaign:0 "虾夷征讨"
 cb_mf_xiayi_campaign_desc:0 "幕府及其大名已将该国列为虾夷征讨目标，可以发动共同讨伐战争。"
